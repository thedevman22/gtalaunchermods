appId: com.modharbor.app
productName: ModHarbor
copyright: Copyright © 2026 ModHarbor

directories:
  output: release
  buildResources: build

# Packaged app contents: compiled output + bundled resources (catalog, dependencies DLLs, icons).
# resources/** is unpacked from asar so native DLLs and JSON can be read at runtime.
files:
  - out/**/*
  - resources/**/*
  - package.json
  - '!**/.vscode/*'
  - '!src/**'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!landing/**'
  - '!server/**'
  - '!scripts/**'
  - '!**/.DS_Store'

asar: true
asarUnpack:
  - resources/**

win:
  target:
    - target: nsis
      arch:
        - x64
  executableName: ModHarbor
  icon: build/icon.ico
  signAndEditExecutable: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  # Stable (unversioned) name so the site can always link releases/latest/download.
  artifactName: ModHarbor-Setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  createStartMenuShortcut: true
  deleteAppDataOnUninstall: false

mac:
  entitlementsInherit: build/entitlements.mac.plist
  icon: build/icon.icns
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false

dmg:
  artifactName: ${productName}-${version}.${ext}

linux:
  target:
    - AppImage
    - deb
  maintainer: modharbor
  category: Game
  icon: build/icon.png

appImage:
  artifactName: ${productName}-${version}.${ext}

npmRebuild: false

publish:
  provider: github
  owner: thedevman22
  repo: gtalaunchermods
  releaseType: release
