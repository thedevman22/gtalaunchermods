name: Deploy app release

# Publish only on version tags. Pushing main + tag together used to start two
# concurrent builds; the tag run would publish while the main run failed on upload.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package.json
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PKG="v${{ steps.version.outputs.version }}"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag $TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Skip if release already published
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.version.outputs.version }} already exists."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm ci

      - name: Build and publish Windows installer
        if: steps.check.outputs.skip != 'true'
        run: npm run build:win:publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_MODHARBOR_WEBSITE_URL: ${{ secrets.VITE_MODHARBOR_WEBSITE_URL }}
          VITE_BILLING_API_URL: ${{ secrets.VITE_BILLING_API_URL }}

      - name: Remove duplicate GitHub releases for tag
        if: success() && steps.check.outputs.skip != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          mapfile -t rows < <(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${REPO}/releases?per_page=30" | \
            jq -r --arg v "$VERSION" '.[] | select(.tag_name==$v) | "\(.id)|\(.assets|map(.name)|join(","))"')
          keep=""
          for row in "${rows[@]}"; do
            id="${row%%|*}"
            names="${row#*|}"
            if [[ "$names" == *"latest.yml"* ]]; then
              keep="$id"
              break
            fi
          done
          for row in "${rows[@]}"; do
            id="${row%%|*}"
            if [[ -n "$keep" && "$id" != "$keep" ]]; then
              echo "Deleting duplicate release $id for $VERSION"
              curl -fsSL -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/repos/${REPO}/releases/${id}"
            fi
          done
